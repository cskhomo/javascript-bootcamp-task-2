<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>Grades Check</title>
      <link rel="stylesheet" href="styles.css">
  </head>
  
  <body>
    <form>
      <label>Name:
        <input type="text" id="name" placeholder="Your Name" required>
      </label>
      
      <label>Grade:
        <input type="number" id="grade" placeholder="Your Grade" min="0" max="100" required>
      </label>
      
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
