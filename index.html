<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>Grades Check</title>
      <link rel="stylesheet" href="styles.css">
  </head>
  
  <body>    
        <form id="studentForm">
            <label for="name">Student Name</label>
            <input type="text" id="name" placeholder="Your name" required>
            
            <label for="grade">Mark (%)</label>
            <input type="number" id="grade" placeholder="Your Grade" min="0" max="100" required>
            
            <button type="submit">Submit</button>
        </form>
  </body>
</html>
