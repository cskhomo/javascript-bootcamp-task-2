<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <title>Grades Check</title>
      <link rel="stylesheet" href="styles.css">
  </head>
 
  <body>
    <form>
      <label>Name:
        <input type="text" id="name" placeholder="Your Name" required>
      </label>
     
      <label>Mark:
        <input type="number" id="mark" placeholder="Your Marks" min="0" max="100" required>
      </label>
     
      <button type="submit">Submit</button>
    </form>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Mark</th>
          <th>Result</th>
          <th>Grade</th>
        </tr>
      </thead>
      
      <tbody></tbody>
    </table>
    
    <script src="script.js"></script>
  </body>
</html>
